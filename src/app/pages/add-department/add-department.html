@if (isLoading) {
<app-loader></app-loader>
}

<div class="page-content">
    <div class="row justify-content-center">
        <div class="col-lg-5 animate-in">
            <div class="form-card">

                <h5 class="mb-4 fw-bold">
                    {{ isEditMode ? 'Edit Department' : 'New Department' }}
                </h5>

                <form (ngSubmit)="onSubmit()">
                    <div class="mb-4">
                        <label class="form-label">Department Name</label>
                        <input type="text" class="form-control" [(ngModel)]="deptName" name="name"
                            placeholder="e.g. Finance" required #nameField="ngModel">
                        @if (nameField.invalid && nameField.touched) {
                        <small class="text-danger">Name is required.</small>
                        }
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a routerLink="/admin-departments" class="btn-cancel">Cancel</a>

                        <button type="submit" class="btn-submit" [disabled]="isLoading || !deptName">
                            {{ isEditMode ? 'Save Changes' : 'Create' }}
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
